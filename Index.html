<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tum Ho Toh...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap');

        * { box-sizing: border-box; }

        body {
            background-color: #fdfbf7;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            color: #333;
            overflow-x: hidden;
        }

        /* ── Hearts Container ── */
        #heartsContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -10%;
            opacity: 0.6;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* ── Hero Section ── */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(to bottom, #eae2d6, #fdfbf7);
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            margin-bottom: 5px;
            color: #5a4b43;
            text-shadow: 2px 2px 10px rgba(200, 180, 160, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #7a6b63;
            max-width: 600px;
            margin-bottom: 20px;
        }

        /* ── Play & Scroll Button ── */
        .play-btn {
            background-color: #b06b7a;
            color: #fdfbf7;
            border: none;
            padding: 12px 28px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(176, 107, 122, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .play-btn:hover {
            background-color: #9a5a68;
            transform: scale(1.05) translateY(-2px);
        }

        /* ── Scroll Hint ── */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 2s infinite;
            color: #b06b7a;
        }

        .scroll-hint span {
            font-size: 0.9rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* ── Timeline & Memories ── */
        .timeline {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            z-index: 1;
            position: relative;
        }

        .memory {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease-out;
            gap: 30px;
        }

        .memory.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .memory:nth-child(even) {
            flex-direction: row-reverse;
        }

        /* ── Polaroid Styling ── */
        .photo-container {
            flex: 1;
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }

        .memory:nth-child(even) .photo-container {
            transform: rotate(3deg);
        }

        .photo-container:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }

        .photo-container img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }

        /* ── Lyrics/Text Styling ── */
        .lyrics {
            flex: 1;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #b06b7a;
            text-align: center;
            padding: 20px;
        }

        /* ── Mobile Responsiveness ── */
        @media (max-width: 768px) {
            .memory, .memory:nth-child(even) {
                flex-direction: column;
                text-align: center;
            }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div id="heartsContainer"></div>

    <audio id="bgMusic" src="audio.mp3" loop></audio>

    <div class="hero">
        <h1>Tum Ho Toh...</h1>
        <div class="subtitle">A little journey down memory lane, celebrating the moments that make us... us. ❤️</div>
        
        <button id="startButton" class="play-btn">Play Music & Start 🎵</button>

        <div class="scroll-hint">
            <span>Scroll down</span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M19 12l-7 7-7-7"/>
            </svg>
        </div>
    </div>

    <div class="timeline">
        
        <div class="memory">
            <div class="photo-container">
                <img src="image1.jpg" alt="Memory 1">
            </div>
            <div class="lyrics">
                "Tum ho toh, gaata hai dil..."
            </div>
        </div>

        <div class="memory">
            <div class="photo-container">
                <img src="image2.jpg" alt="Memory 2">
            </div>
            <div class="lyrics">
                "Tum nahi, toh geet kahan..."
            </div>
        </div>

        <div class="memory">
            <div class="photo-container">
                <img src="image3.jpg" alt="Memory 3">
            </div>
            <div class="lyrics">
                "Tum ho toh, hai sab haasil..."
            </div>
        </div>

    </div>

    <script>
        let autoScrolling = false;
        let scrollInterval;
        let userScrollTimer;

        // ── Start Button Logic ───────────────────────────────────────────
        document.getElementById('startButton').addEventListener('click', function() {
            // Play audio
            const audio = document.getElementById('bgMusic');
            audio.play().catch(error => console.log("Audio play failed:", error));
            
            // Hide the button smoothly
            this.style.opacity = '0';
            this.style.pointerEvents = 'none';

            // Start auto-scrolling
            startAutoScroll();
        });

        // ── Auto Scroll Function ─────────────────────────────────────────
        function startAutoScroll() {
            if (autoScrolling) return;
            autoScrolling = true;
            scrollInterval = setInterval(() => {
                window.scrollBy(0, 1);
            }, 30); // Adjust speed here (lower number = faster)
        }

        function stopAutoScroll() {
            autoScrolling = false;
            clearInterval(scrollInterval);
        }

        // Pause auto-scroll if user scrolls manually, resume after 3 seconds
        window.addEventListener('wheel', () => {
            stopAutoScroll();
            clearTimeout(userScrollTimer);
            userScrollTimer = setTimeout(startAutoScroll, 3000);
        }, { passive: true });

        window.addEventListener('touchstart', () => {
            stopAutoScroll();
            clearTimeout(userScrollTimer);
            userScrollTimer = setTimeout(startAutoScroll, 3000);
        }, { passive: true });

        // ── Intersection Observer for Fade-in ────────────────────────────
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.memory, .final-card').forEach(el => observer.observe(el));

        // ── Floating Hearts ───────────────────────────────────────────────
        const container = document.getElementById('heartsContainer');
        const heartEmojis = ['❤️','🩷','💕','💗','💓','🌸'];

        function spawnHeart() {
            const h = document.createElement('div');
            h.classList.add('heart');
            h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            h.style.left = Math.random() * 100 + 'vw';
            const dur = 6 + Math.random() * 8;
            h.style.animationDuration = dur + 's';
            h.style.animationDelay = Math.random() * 3 + 's';
            h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
            container.appendChild(h);
            setTimeout(() => h.remove(), (dur + 3) * 1000);
        }

        setInterval(spawnHeart, 800);
    </script>
</body>
</html>
